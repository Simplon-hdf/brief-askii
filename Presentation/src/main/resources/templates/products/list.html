<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Produits</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Nos Produits</h1>
            <a href="/products/new" class="mt-4 inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Ajouter un produit
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="product : ${products}" class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="p-6">
                    <h2 class="text-xl font-semibold text-gray-800" th:text="${product.name}">Nom du produit</h2>
                    <p class="mt-2 text-gray-600" th:text="${product.price + ' €'}">Prix</p>
                    <a th:href="@{/products/{id}(id=${product.product_id})}" 
                       class="mt-4 inline-block bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                        Voir détails
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
