<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name}">Détail du Produit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <nav class="mb-8">
            <a href="/products" class="text-blue-500 hover:text-blue-700">← Retour aux produits</a>
        </nav>

        <div class="bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-4" th:text="${product.name}">Nom du produit</h1>
            <p class="text-2xl text-gray-700 mb-8" th:text="${product.price + ' €'}">Prix</p>

            <form th:action="@{/cart/add}" method="post" class="mt-8">
                <input type="hidden" name="product_id" th:value="${product.product_id}">
                
                <div class="mb-6">
                    <label for="quantity" class="block text-gray-700 text-sm font-bold mb-2">Quantité :</label>
                    <input type="number" 
                           id="quantity" 
                           name="quantity" 
                           min="1" 
                           value="1" 
                           class="shadow appearance-none border rounded w-32 py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>

                <button type="submit" 
                        class="bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-600 focus:outline-none focus:shadow-outline">
                    Ajouter au panier
                </button>
            </form>
        </div>
    </div>
</body>
</html>
